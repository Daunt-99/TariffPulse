[tool.ruff]
target-version = "py311"
line-length = 100
src = ["apps/api", "services"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "RUF"]

[tool.pytest.ini_options]
pythonpath = ["apps/api", "services/ingestion/src", "services/nlp/src", "services/reaction-engine/src", "services/ml/src"]
testpaths = ["apps/api/tests", "services/ingestion/tests", "services/nlp/tests", "services/reaction-engine/tests", "services/ml/tests"]

